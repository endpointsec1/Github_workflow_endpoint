name: n8n Workflow Audit

on:
  push:
    paths:
      - "workflows/**/*.json"
    branches:
      - main

  pull_request:
    paths:
      - "workflows/**/*.json"

  workflow_dispatch:
    inputs:
      workflow_file:
        description: >
          Specific workflow JSON to audit (e.g. workflows/my_workflow.json).
          Leave blank to audit ALL.
        required: false
        default: ""

permissions:
  contents: read

jobs:
  audit:
    name: Audit n8n Workflows
    runs-on: ubuntu-latest

    steps:

      # 1. Checkout source repo
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Python setup
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 3. Detect files
      - name: Identify files
        id: detect
        run: |
          if [ -n "${{ github.event.inputs.workflow_file }}" ]; then
            echo "${{ github.event.inputs.workflow_file }}" > files.txt

          elif [ "${{ github.event_name }}" = "push" ]; then
            git diff --name-only ${{ github.event.before }} ${{ github.sha }} \
              -- 'workflows/**/*.json' > files.txt || true

          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            git diff --name-only ${{ github.event.pull_request.base.sha }} \
              ${{ github.sha }} -- 'workflows/**/*.json' > files.txt || true
          else
            find workflows -name '*.json' > files.txt
          fi

          sed -i '/^$/d' files.txt

          COUNT=$(wc -l < files.txt | tr -d ' ')
          echo "file_count=$COUNT" >> $GITHUB_OUTPUT
          echo "::notice::Found $COUNT files"
          cat files.txt

      # 4. Run audit
      - name: Run audit
        id: audit
        if: steps.detect.outputs.file_count != '0'
        run: |
          OUTDIR="${{ runner.temp }}/audit-results"
          mkdir -p "$OUTDIR"

          OVERALL="PASS"

          while IFS= read -r wf; do
            [ -z "$wf" ] && continue
            [ ! -f "$wf" ] && continue

            NAME=$(basename "$wf" .json)
            mkdir -p "$OUTDIR/$NAME"

            echo "::group::$wf"

            python3 scripts/n8n_audit_v3.py "$wf" \
              -o "$OUTDIR/$NAME/report.html" \
              --json "$OUTDIR/$NAME/findings.json" \
              -c "Axos" -c "AxosFinancial" \
              && STATUS="PASS" || STATUS="FAIL"

            echo "$NAME → $STATUS"

            if [ "$STATUS" = "FAIL" ]; then
              OVERALL="FAIL"
            fi

            echo "::endgroup::"
          done < files.txt

          echo "overall_status=$OVERALL" >> $GITHUB_OUTPUT
          echo "::notice::Overall: $OVERALL"

          echo "::group::Files created"
          find "$OUTDIR"
          echo "::endgroup::"

      # 5. Upload artifact
      - name: Upload artifacts
        if: always() && steps.detect.outputs.file_count != '0'
        uses: actions/upload-artifact@v4
        with:
          name: audit-${{ github.sha }}
          path: ${{ runner.temp }}/audit-results/
          retention-days: 30

      # 6. Checkout endpoint repo
      - name: Checkout endpoint repo
        if: >
          steps.detect.outputs.file_count != '0' &&
          (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
          github.ref == 'refs/heads/main'
        uses: actions/checkout@v4
        with:
          repository: endpointsec1/Github_workflow_endpoint
          token: ${{ secrets.ENDPOINT_REPO_PAT }}
          path: endpoint

      # 7. Push results
      - name: Push results
        if: >
          steps.detect.outputs.file_count != '0' &&
          (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
          github.ref == 'refs/heads/main'
        run: |
          SRC="${{ runner.temp }}/audit-results"
          DEST="endpoint/results/$(date +%Y%m%d-%H%M%S)"

          mkdir -p "$DEST"

          # safer copy (handles empty + preserves structure)
          cp -R "$SRC"/. "$DEST"/ || echo "Nothing to copy"

          cat > "$DEST/LAST_RUN.txt" <<EOF
          time=$(date -u)
          repo=${{ github.repository }}
          commit=${{ github.sha }}
          status=${{ steps.audit.outputs.overall_status }}
          actor=${{ github.actor }}
          event=${{ github.event_name }}
          EOF

          cd endpoint
          git config user.name "audit-bot"
          git config user.email "bot@users.noreply.github.com"

          git add results/
          git commit -m "audit: ${{ steps.audit.outputs.overall_status }} ${{ github.sha }}" \
            || echo "No changes"

          git push

      # 8. PR gate
      - name: Fail on audit FAIL
        if: >
          steps.audit.outputs.overall_status == 'FAIL' &&
          github.event_name == 'pull_request'
        run: |
          echo "::error::Audit failed"
          exit 1
