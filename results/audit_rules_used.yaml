# -- Risky Node Patterns (need error handling) --
risky_node_patterns:
  - pattern: airtable
    recommendation: Validate record/document IDs before execution; add an Error Workflow.
  - pattern: code
    recommendation: Custom Code nodes throw on runtime errors; wrap in try/catch.
  - pattern: databricks
    recommendation: Wrap DB ops with Continue On Error and validate inputs.
  - pattern: discord
    recommendation: "External APIs can rate-limit; add Error Workflows + fallback channel."
  - pattern: email
    recommendation: "External APIs can rate-limit; add Error Workflows + fallback channel."
  - pattern: function
