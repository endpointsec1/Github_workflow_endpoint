# -- Verdict Thresholds --
verdict:
  max_medium_before_fail: 5
  fail_on_any_high: true
  fail_on_no_error_workflow: true
  fail_on_open_webhook: true
  fail_on_prompt_injection_path: true
  fail_on_hardcoded_secret: true
  fail_on_pindata_shipped: true

# -- Guardrail Keywords (for AI prompt checks) --
